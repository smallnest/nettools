name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go_badges:
    runs-on: ubuntu-latest
    name: A job to generate badges
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.*"

      - name: Generate coverage
        id: coverage
        run: |
          go test -coverprofile=coverage.out $(go list ./... | grep -vE "vendor|/cmd")
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Get Go Report Card
        id: goreportcard
        run: |
          GRADE=$(curl -sS https://goreportcard.com/report/github.com/baidu/nettools | grep -oP 'grade is \K[A-F]\+?' | head -1 || echo "")
          if [ -n "$GRADE" ]; then
            echo "reportCard=Grade: $GRADE" >> $GITHUB_OUTPUT
          else
            echo "reportCard=" >> $GITHUB_OUTPUT
          fi

      - id: badges
        uses: jacobkring/go-badges@v1.10.4
        with:
          report-card: ${{ steps.goreportcard.outputs.reportCard }}
          coverage: ${{ steps.coverage.outputs.coverage }}
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.*"

      - name: Build
        run: make compile

      - name: Test
        run: go test -race -timeout=120s -cover $(go list ./... | grep -vE "vendor|/cmd")

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: test -z "$(gofmt -l .)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.*"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
